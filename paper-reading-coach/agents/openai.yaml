interface:
  display_name: "Paper Reading Coach"
  short_description: "Read papers with natural Q&A, guidance, exams, and synthesis"
  brand_color: "#2563EB"
  default_prompt: "Use $paper-reading-coach to help me read a research paper naturally. Start with a lightweight reading map and main questions, infer whether I am skimming or deep-reading, answer my direct questions first, ask only natural follow-ups when they help, and offer an exam or final synthesis when I finish."

policy:
  allow_implicit_invocation: true
