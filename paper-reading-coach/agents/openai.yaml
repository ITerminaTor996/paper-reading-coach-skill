interface:
  display_name: "Paper Reading Coach"
  short_description: "Read papers with gated quizzes, hints, and critique"
  brand_color: "#2563EB"
  default_prompt: "Use $paper-reading-coach to guide me through a research paper section by section. Gate each section, quiz my understanding before explaining, scaffold hints when I get stuck, and help critique figures, methods, and evidence."

policy:
  allow_implicit_invocation: true
