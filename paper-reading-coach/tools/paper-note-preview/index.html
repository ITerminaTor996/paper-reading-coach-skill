<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper Note Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <style>
    :root {
      --paper: #fbfbf8;
      --ink: #20201d;
      --muted: #666a60;
      --line: #d8d8cf;
      --panel: #ffffff;
      --accent: #0d7c72;
      --accent-2: #b53d2a;
      --shadow: 0 18px 50px rgba(32, 32, 29, 0.08);
      --mono: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      --serif: Georgia, "Times New Roman", "Noto Serif SC", serif;
      --sans: "Segoe UI", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(13, 124, 114, 0.05), transparent 32%),
        repeating-linear-gradient(0deg, rgba(32, 32, 29, 0.025) 0 1px, transparent 1px 32px),
        var(--paper);
      font-family: var(--sans);
    }

    .shell {
      width: min(1500px, calc(100vw - 32px));
      min-height: calc(100vh - 32px);
      margin: 16px auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(22px, 2vw, 34px);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 0 11px;
      border-radius: 6px;
      font: 600 13px/1 var(--sans);
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.danger:hover {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    button svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 0.92fr) minmax(360px, 1.08fr);
      gap: 12px;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .pane-head {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 13px;
      border-bottom: 1px solid var(--line);
      background: #f4f4ef;
    }

    .pane-head strong {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pill {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      resize: none;
      border: 0;
      outline: 0;
      padding: 18px;
      color: #1f241f;
      background: #fffefa;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.62;
    }

    .preview {
      min-height: 0;
      overflow: auto;
      padding: 26px min(44px, 4vw);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.72;
    }

    .preview > :first-child {
      margin-top: 0;
    }

    .preview h1,
    .preview h2,
    .preview h3 {
      font-family: var(--sans);
      line-height: 1.22;
      letter-spacing: 0;
    }

    .preview h1 {
      font-size: 30px;
      margin: 0 0 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }

    .preview h2 {
      font-size: 22px;
      margin: 30px 0 10px;
    }

    .preview h3 {
      font-size: 17px;
      margin: 24px 0 8px;
      color: var(--accent);
    }

    .preview p {
      margin: 0 0 14px;
    }

    .preview a {
      color: var(--accent);
    }

    .preview blockquote {
      margin: 18px 0;
      padding: 10px 16px;
      border-left: 4px solid var(--accent);
      background: #f3faf8;
      color: #2d413d;
    }

    .preview code {
      font-family: var(--mono);
      font-size: 0.88em;
      background: #f0f0e9;
      border: 1px solid #deded4;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .preview pre {
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--line);
      background: #f8f8f4;
    }

    .preview pre code {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-family: var(--sans);
      font-size: 14px;
    }

    .preview th,
    .preview td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
    }

    .preview th {
      background: #f4f4ef;
      text-align: left;
    }

    .empty {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 14px;
      border: 1px dashed var(--line);
      padding: 18px;
      background: #fbfbf8;
    }

    .status {
      min-width: 130px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 880px) {
      .shell {
        width: min(100vw - 18px, 760px);
        min-height: auto;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 52vh;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="title">
        <h1>Paper Note Preview</h1>
        <p class="subtitle">临时预览 Codex 的 Markdown、公式和代码块。内容只在当前页面和本地服务内存中，不归档。</p>
      </div>
      <div class="toolbar" aria-label="Preview controls">
        <button id="sampleBtn" type="button" title="Load a short math-heavy sample"><i data-lucide="file-text"></i>示例</button>
        <button id="copyBtn" class="primary" type="button" title="Copy raw Markdown"><i data-lucide="copy"></i>复制 Markdown</button>
        <button id="clearBtn" class="danger" type="button" title="Clear editor"><i data-lucide="trash-2"></i>清空</button>
      </div>
    </header>

    <section class="workspace" aria-label="Markdown editor and rendered preview">
      <article class="pane">
        <div class="pane-head">
          <strong>Markdown</strong>
          <span class="pill">自动接收或手动粘贴</span>
        </div>
        <textarea id="editor" spellcheck="false" placeholder="把 Codex 生成的 Markdown 笔记粘贴到这里。支持 $...$ 和 $$...$$ 公式。"></textarea>
      </article>

      <article class="pane">
        <div class="pane-head">
          <strong>Preview</strong>
          <span id="status" class="status">Ready</span>
        </div>
        <div id="preview" class="preview" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.475.0/dist/umd/lucide.min.js"></script>
  <script>
    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const status = document.getElementById("status");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const sampleBtn = document.getElementById("sampleBtn");

    const sample = `### Flow Matching 的直觉

Flow Matching 把生成过程看成从噪声 $x_0$ 到真实数据 $x_1$ 的连续流动。

核心路径是：

$$
x_t = (1-t)x_0 + tx_1
$$

模型学习的不是直接生成图片，而是学习一个速度场：

$$
v = x_1 - x_0
$$

这个机制对 Dreamer 4 的意义在于：它把复杂的视频生成过程压缩成可学习、可加速的预测问题。

| 符号 | 含义 |
| --- | --- |
| $x_0$ | 噪声样本 |
| $x_1$ | 真实数据 |
| $x_t$ | 中间状态 |

> 这段笔记只是临时预览，不会被保存。`;

    const rendererReady = () => window.markdownit && window.DOMPurify;

    const md = window.markdownit ? window.markdownit({
      html: false,
      linkify: true,
      typographer: true,
      highlight(str, lang) {
        if (window.hljs && lang && window.hljs.getLanguage(lang)) {
          try {
            return window.hljs.highlight(str, { language: lang }).value;
          } catch (error) {
            return "";
          }
        }
        return "";
      }
    }) : null;

    if (md && window.texmath && window.katex) {
      md.use(window.texmath, {
        engine: window.katex,
        delimiters: "dollars",
        katexOptions: { throwOnError: false, strict: false }
      });
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function render() {
      if (!rendererReady() || !md) {
        preview.innerHTML = '<div class="empty">Renderer CDN scripts are not loaded yet. Check network access, then refresh.</div>';
        setStatus("Renderer missing");
        return;
      }

      const source = editor.value.trim();
      if (!source) {
        preview.innerHTML = '<div class="empty">这里会显示渲染后的 Markdown 和公式。页面不会保存你的内容。</div>';
        setStatus("Empty");
        return;
      }

      const unsafeHtml = md.render(source);
      preview.innerHTML = window.DOMPurify.sanitize(unsafeHtml);
      setStatus(`${source.length} chars`);
    }

    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    editor.addEventListener("input", debounce(render, 80));

    let lastRemoteUpdatedAt = null;

    async function pullLatest() {
      if (!location.protocol.startsWith("http")) {
        return;
      }

      try {
        const response = await fetch("/api/latest", { cache: "no-store" });
        if (!response.ok) {
          return;
        }

        const payload = await response.json();
        if (!payload.updatedAt || payload.updatedAt === lastRemoteUpdatedAt) {
          return;
        }

        lastRemoteUpdatedAt = payload.updatedAt;
        editor.value = payload.markdown || "";
        render();
        setStatus("Live update");
      } catch (error) {
        setStatus("Manual mode");
      }
    }

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(editor.value);
        setStatus("Markdown copied");
      } catch (error) {
        editor.select();
        document.execCommand("copy");
        setStatus("Copied");
      }
    });

    clearBtn.addEventListener("click", () => {
      editor.value = "";
      render();
      editor.focus();
    });

    sampleBtn.addEventListener("click", () => {
      editor.value = sample;
      render();
      editor.focus();
    });

    if (window.lucide) {
      window.lucide.createIcons();
    }

    render();
    pullLatest();
    setInterval(pullLatest, 900);
  </script>
</body>
</html>
